<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع قيد الصيانة</title>
    <style>
        /* ==========================================
           1. التنسيقات الأساسية وإعادة التعيين
        ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117; /* خلفية داكنة احترافية مريحة للعين */
            color: #c9d1d9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        /* ==========================================
           2. حاوية المحتوى الرئيسية (تأثير زجاجي خفيف)
        ========================================== */
        .maintenance-container {
            text-align: center;
            max-width: 550px;
            width: 100%;
            padding: 40px 30px;
            background: rgba(22, 27, 34, 0.8);
            border: 1px solid #30363d;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
        }

        /* ==========================================
           3. تأثير الأيقونة ونبض الإضاءة (Glow & Rotate)
        ========================================== */
        .gear-wrapper {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }

        .maintenance-icon {
            font-size: 4rem;
            display: inline-block;
            animation: rotateGear 4s linear infinite;
        }

        .pulse-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: rgba(88, 166, 255, 0.15);
            border-radius: 50%;
            z-index: -1;
            animation: pulseGlow 2s infinite ease-in-out;
        }

        /* ==========================================
           4. النصوص والعناوين
        ========================================== */
        h1 {
            font-size: 2rem;
            color: #f0f6fc;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .description {
            font-size: 1rem;
            color: #8b949e;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* ==========================================
           5. شريط التقدم اللامع (Progress Bar)
        ========================================== */
        .progress-container {
            width: 100%;
            background-color: #21262d;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 35px;
            overflow: hidden;
        }

        .progress-bar {
            width: 65%; /* يمكنك تعديل النسبة هنا لعرض مدى تقدم الصيانة */
            height: 100%;
            background: linear-gradient(90deg, #58a6ff, #1f6feb);
            border-radius: 3px;
            animation: progressGlow 2s ease-in-out infinite alternate;
        }

        /* ==========================================
           6. الأزرار والتفاعل
        ========================================== */
        .btn-primary {
            background-color: #238636;
            color: #ffffff;
            border: none;
            padding: 12px 28px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease, transform 0.1s ease;
        }

        .btn-primary:hover {
            background-color: #2ea043;
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .status-message {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #58a6ff;
            min-height: 20px;
            transition: all 0.3s ease;
        }

        /* ==========================================
           7. الحركات والأنميشن (Animations)
        ========================================== */
        @keyframes rotateGear {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
            50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.1; }
            100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.6; }
        }

        @keyframes progressGlow {
            0% { filter: brightness(1); }
            100% { filter: brightness(1.4); }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <!-- منطقة الأيقونة المتحركة -->
        <div class="gear-wrapper">
            <div class="pulse-circle"></div>
            <span class="maintenance-icon">⚙️</span>
        </div>

        <!-- النصوص التوضيحية -->
        <h1>نحن نطور شيئاً رائعاً!</h1>
        <p class="description">الموقع حالياً قيد الصيانة الدورية لتحديث الأنظمة وتحسين تجربتكم. سنعود للعمل بكفاءة أعلى خلال وقت قصير جداً.</p>

        <!-- شريط حالة التقدم التقديري -->
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>

        <!-- زر الإشعار والتفاعل -->
        <div class="actions">
            <button id="notifyBtn" class="btn-primary">أعلمني فور الجاهزية</button>
        </div>
        
        <!-- مكان ظهور رسالة التأكيد -->
        <p id="statusMessage" class="status-message"></p>
    </div>

    <!-- ==========================================
       8. كود الـ JavaScript للتفاعل
    ========================================== -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const notifyBtn = document.getElementById('notifyBtn');
            const statusMessage = document.getElementById('statusMessage');

            notifyBtn.addEventListener('click', () => {
                // تغيير تصميم الزر ليوحي بنجاح العملية وإلغاء تفعيله
                notifyBtn.innerText = "تم التسجيل بنجاح ✓";
                notifyBtn.style.backgroundColor = "#21262d";
                notifyBtn.style.color = "#8b949e";
                notifyBtn.style.cursor = "default";
                notifyBtn.disabled = true;

                // طباعة رسالة شكر للزائر
                statusMessage.innerText = "شكرًا لاهتمامك! سنقوم بإرسال إشعار إليك بمجرد إطلاق الموقع.";
            });
        });
    </script>
</body>
</html>
